name: Nix Build & Cache

on:
  # Callable from release.yml
  workflow_call:
    inputs:
      tag:
        description: 'Git ref to build (tag or branch)'
        required: false
        type: string
        default: ''
    secrets:
      SCOPE_CREEP_CACHIX_PRIVATE_KEY:
        required: true

  # Also runs standalone on PRs for cache warming
  pull_request:
    branches: [main]

jobs:
  nix-cache:
    name: Nix ${{ matrix.system }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-24.04
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: scopecreep-zip
          authToken: ${{ secrets.SCOPE_CREEP_CACHIX_PRIVATE_KEY }}

      - name: Build packages (with raised mlock limit for ProtectedAlloc)
        run: |
          sudo prlimit --pid $$ --memlock=268435456:268435456
          nix build .#packages.${{ matrix.system }}.open-sesame --accept-flake-config -L
          nix build .#packages.${{ matrix.system }}.open-sesame-desktop --accept-flake-config -L
